{% extends 'template.twig.html' %}
    
{% block title %}Modifier un Etudiant – StageAlternance{% endblock %}

{% block stylesheets %}
<link rel="stylesheet" href="/css/connexion_admin.css">
{% endblock %}

{% block body %}
<div class="admin-section">
    <div class="admin-header">
        <h1>✏️ Modifier l'Etudiant</h1>
    </div>

    {% if message %}
        <div class="alert alert-{{ message|length > 50 ? 'error' : 'warning' }}">{{ message }}</div>
    {% endif %}

    <form method="POST" class="admin-form">
        <input type="hidden" name="id" value="{{ etudiant.id_utilisateur }}">

        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" value="{{ etudiant.email }}" required>
        </div>

        <div class="form-group">
            <label for="nom">Nom *</label>
            <input type="text" id="nom" name="nom" value="{{ etudiant.nom }}" required>
        </div>

        <div class="form-group">
            <label for="prenom">Prenom *</label>
            <input type="text" id="prenom" name="prenom" value="{{ etudiant.prenom }}" required>
        </div>

        <div class="form-group">
            <label for="id_pilote">Pilote Attribue *</label>
            <select id="id_pilote" name="id_pilote">
                <option value="">-- Selectionner un pilote --</option>
                {% for pilote in pilotes %}
                    <option value="{{ pilote.id_pilote }}" {% if etudiant.id_pilote == pilote.id_pilote %}selected{% endif %}>
                        {{ pilote.prenom }} {{ pilote.nom }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-buttons">
            <button type="submit" class="btn btn-primary">Mettre a Jour</button>
            <a href="/admin-etudiants" class="btn">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
